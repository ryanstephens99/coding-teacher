[tool:pytest]
minversion = 6.0
addopts = 
    -ra 
    --strict-markers 
    --strict-config 
    --cov=src 
    --cov-report=term-missing 
    --cov-report=html 
    --cov-report=xml
    --cov-fail-under=80
testpaths = tests
asyncio_mode = auto
python_files = tests/*.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow running tests 