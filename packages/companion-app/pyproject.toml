[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "codementor-companion"
version = "0.0.1"
description = "Desktop companion service for CodeMentor AI"
authors = [{name = "Ryan Stephens"}]
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.104.1",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.5.0",
    "python-multipart>=0.0.6",
    "websockets>=12.0",
    "aiofiles>=23.2.1",
    "python-dotenv>=1.0.0",
    "httpx>=0.25.2",
    "openai>=1.3.0",
    "anthropic>=0.7.0",
    "tree-sitter>=0.20.4",
    "tree-sitter-python>=0.20.4",
    "tree-sitter-javascript>=0.20.1",
    "tree-sitter-typescript>=0.20.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "pytest-asyncio>=0.21.1",
    "black>=23.11.0",
    "pylint>=3.0.3",
]

[tool.black]
line-length = 88
target-version = ['py39']

[tool.pylint.messages_control]
disable = "C0330, C0326"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"] 